  const bases = ses.base==='ALL' ? gab() : gab().filter(b=>b.code===ses.base);
  const today2 = today();

  // Build 60-day date array
  const dates = [];
  for(let i=0;i<60;i++){
    const d = new Date();
    d.setDate(d.getDate()+i);
    dates.push(d.toISOString().slice(0,10));
  }

  // Group dates by week
  const weeks = [];
  let week = [];
  dates.forEach(d=>{
    week.push(d);
    if(week.length===7){ weeks.push(week); week=[]; }
  });
  if(week.length) weeks.push(week);

  let html = `<div class="ptitle">Staffing Schedule</div>
  <div class="psub">${canEdit?'Tap a day to mark crew or pilot shortages.':'Shortage days shown. Tap for details.'}</div>`;

  // Legend
  html += `<div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:5px;font-size:12px;">
      <span style="width:10px;height:10px;border-radius:50%;background:var(--amber);display:inline-block;"></span>Pilot shortage
    </div>
    <div style="display:flex;align-items:center;gap:5px;font-size:12px;">
      <span style="width:10px;height:10px;border-radius:50%;background:var(--red);display:inline-block;"></span>Crew shortage
    </div>
    <div style="display:flex;align-items:center;gap:5px;font-size:12px;">
      <span style="width:10px;height:10px;border-radius:2px;background:var(--accent);opacity:0.4;display:inline-block;"></span>Today
    </div>
  </div>`;

  el.innerHTML = html;

  bases.forEach(b=>{
    const card = document.createElement('div');
    card.className='card';
    card.style.marginBottom='12px';

    // Day-of-week headers
    const dowHeaders = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let ch = `<div style="padding:10px 14px;border-bottom:1px solid var(--border);">
      <span style="font-family:var(--mono);font-size:13px;font-weight:800;color:var(--accent);">${b.code}</span>
      <span style="font-size:15px;font-weight:700;margin-left:8px;">${b.name}</span>
    </div>
    <div style="padding:10px 12px;">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;">
        ${dowHeaders.map(d=>`<div style="text-align:center;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text3);padding:2px 0;">${d}</div>`).join('')}
      </div>`;

    // Fill leading empty cells for first week
    const firstDate = new Date(dates[0]+'T12:00:00');
    const startDow = firstDate.getDay();

    ch += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">';
    // Empty cells before first day
    for(let i=0;i<startDow;i++){
      ch += '<div></div>';
    }

    dates.forEach(date=>{
      const am = getSchedEntry(b.code, date, 'AM');
      const pm = getSchedEntry(b.code, date, 'PM');
      const hasPilot = am.pilot||pm.pilot;
      const hasCrew  = am.crew||pm.crew;
      const isToday  = date===today2;
      const dayNum   = new Date(date+'T12:00:00').getDate();

      let bg = 'var(--bg2)';
      let border = '1px solid var(--border2)';
      if(isToday){ bg='rgba(0,194,255,0.15)'; border='1px solid var(--accent)'; }

      // Determine cell appearance based on shortages
      let cellBg = bg;
      let cellBorder = border;
      let labelColor = isToday?'var(--accent)':'var(--text2)';
      let shortageBar = '';

      if(hasPilot && hasCrew){
        cellBg = 'rgba(212,60,60,0.15)';
        cellBorder = '1px solid var(--red)';
        labelColor = 'var(--text)';
        shortageBar = '<div style="display:flex;gap:1px;width:100%;margin-top:2px;">'
          + '<div style="flex:1;height:3px;border-radius:1px;background:var(--amber);"></div>'
          + '<div style="flex:1;height:3px;border-radius:1px;background:var(--red);"></div>'
          + '</div>';
      } else if(hasPilot){
        cellBg = 'rgba(212,134,10,0.12)';
        cellBorder = '1px solid var(--amber)';
        labelColor = 'var(--text)';
        shortageBar = '<div style="width:100%;height:3px;border-radius:1px;background:var(--amber);margin-top:2px;"></div>';
      } else if(hasCrew){
        cellBg = 'rgba(212,60,60,0.12)';
        cellBorder = '1px solid var(--red)';
        labelColor = 'var(--text)';
        shortageBar = '<div style="width:100%;height:3px;border-radius:1px;background:var(--red);margin-top:2px;"></div>';
      }
      if(isToday){ cellBorder = '2px solid var(--accent)'; }

      // Shift indicators — show AM/PM separately
      const amEntry = getSchedEntry(b.code, date, 'AM');
      const pmEntry = getSchedEntry(b.code, date, 'PM');
      const amIcon = (amEntry.pilot||amEntry.crew)
        ? '<div style="font-size:7px;font-family:var(--mono);font-weight:700;color:var(--text3);">AM'
          + (amEntry.pilot?'✈':'') + (amEntry.crew?'👥':'') + '</div>' : '';
      const pmIcon = (pmEntry.pilot||pmEntry.crew)
        ? '<div style="font-size:7px;font-family:var(--mono);font-weight:700;color:var(--text3);">PM'
          + (pmEntry.pilot?'✈':'') + (pmEntry.crew?'👥':'') + '</div>' : '';

      ch += `<div onclick="showSchedDetail('${b.code}','${date}')"
        style="background:${cellBg};border:${cellBorder};border-radius:5px;
        padding:4px 2px 3px;text-align:center;cursor:pointer;min-height:48px;
        display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
        transition:opacity 0.15s;">
        <div style="font-family:var(--mono);font-size:11px;font-weight:${isToday?'800':'700'};
          color:${labelColor};line-height:1.3;">${dayNum}</div>
        ${(!hasPilot && !hasCrew && !isToday) ? '<div style="font-size:8px;color:var(--green);font-weight:700;font-family:var(--mono);">OK</div>' : ''}
        ${amIcon}${pmIcon}
        ${shortageBar}
      </div>`;
    });

    ch += '</div></div>';
    card.innerHTML = ch;
    el.appendChild(card);
  });
}

// ═══ CLOCK ═══════════════════════════════════════════════
function startClk(){
  function tick(){const el=document.getElementById('clk');if(el)el.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
  tick();setInterval(tick,1000);
}

// ═══ PWA ═════════════════════════════════════════════════
function initPWA(){
  // Inject the web app manifest as a blob (works from file:// and http://)
  const manifest = {
    name: 'Air Methods — Jefferson Hospital',
    short_name: 'Base MGR',
    description: 'Jefferson Hospital EMS Program maintenance manager',
    start_url: '.',
    display: 'standalone',
    background_color: '#0b0e13',
    theme_color: '#0b0e13',
    orientation: 'portrait-primary',
    icons: [
      { src: _pwaIcon(192), sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: _pwaIcon(512), sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  document.getElementById('pwa-manifest').href = url;

  // Register service worker for offline caching
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'airmethods-v1';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.add('/')));
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys =>
          Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
        ));
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
      });
    `;
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }

  // Handle install prompt (Android Chrome shows "Add to Home Screen")
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // Show install button in sidebar footer
    const foot = document.querySelector('.sbfoot');
    if (foot && !document.getElementById('pwa-install')) {
      const btn = document.createElement('button');
      btn.id = 'pwa-install';
      btn.className = 'lout';
      btn.style.color = 'var(--accent)';
      btn.textContent = '⬇ Install App';
      btn.onclick = () => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt=null; btn.remove(); });
      };
      foot.insertBefore(btn, foot.firstChild);
    }
  });
}

function _pwaIcon(size){
  try {
  // Generate a simple canvas icon
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  if (!ctx) return '';
  // Background
  ctx.fillStyle = '#0b0e13';
  ctx.fillRect(0,0,size,size);
  // Rounded rect bg
  const pad = size*0.1;
  ctx.fillStyle = '#111520';
  ctx.beginPath();
  ctx.roundRect(pad,pad,size-pad*2,size-pad*2,size*0.15);
  ctx.fill();
  // Blue accent bar top
  ctx.fillStyle = '#00c2ff';
  ctx.fillRect(pad,pad,size-pad*2,size*0.06);
  // Text
  ctx.fillStyle = '#00c2ff';
  ctx.font = `bold ${size*0.22}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('BASE', size/2, size*0.42);
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size*0.16}px Arial`;
  ctx.fillText('MGR', size/2, size*0.62);
  // Small helicopter icon
  ctx.fillStyle = '#ffb300';
  ctx.font = `${size*0.18}px Arial`;
  ctx.fillText('✈', size/2, size*0.81);
  return canvas.toDataURL('image/png');
  } catch(e) { return ''; }
}

// Run PWA init safely after DOM is fully ready
try {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => { try { initPWA(); } catch(e) {} });
  } else {
    setTimeout(() => { try { initPWA(); } catch(e) {} }, 500);
  }
} catch(e) {}

// ── Checklist history helpers ─────────────────────────────
function getMonthDays(base, type){
  // Returns array of last 30 days [{date, pct, done, total, items}]
  const days = [];
  for(let i=29; i>=0; i--){
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().slice(0,10);
    const k = clK(base, type, dateStr);
    const cl = S.checklists[k];
    if(cl && cl.items && cl.items.length){
      const applicable = cl.items.filter(it=>!it.na);
      const total = applicable.length;
      const done  = applicable.filter(it=>it.done).length;
      const pct   = total ? Math.round(done/total*100) : 100;
      days.push({date:dateStr, pct, done, total, items:cl.items, label:d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'})});
    } else {
      days.push({date:dateStr, pct:null, done:0, total:0, items:[], label:d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'})});
    }
  }
  return days;
}

function getLast7(base, type){
  return getMonthDays(base, type).slice(-7);
}

// Prune checklists older than 31 days to keep storage lean
function pruneOldChecklists(){
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 31);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  let pruned = 0;
  Object.keys(S.checklists).forEach(k=>{
    const cl = S.checklists[k];
    if(cl && cl.date && cl.date < cutoffStr){
      delete S.checklists[k];
      pruned++;
    }
  });
  if(pruned > 0) ss();
}

// Day-square color
function dayColor(pct){
  if(pct===null)    return 'var(--bg4)';       // no data
  if(pct===100)     return 'var(--green)';
  if(pct >= 50)     return 'var(--amber)';
  if(pct > 0)       return 'var(--red)';
  return 'var(--red)';
}

// 7-day strip HTML for a base — compact colored squares
function clWeekStrip(base, type){
  const days = getLast7(base, type);
  const ts = today();
  let html = '<div style="display:flex;gap:3px;align-items:center;">';
  days.forEach(d=>{
    const isToday = d.date === ts;
    const color = dayColor(d.pct);
    const label = d.pct===null ? '—' : d.pct+'%';
    html += `<div title="${d.label}: ${label}" onclick="showDayDetail('${base}','${type}','${d.date}')"
      style="width:${isToday?'28px':'22px'};height:${isToday?'28px':'22px'};border-radius:4px;
      background:${color};opacity:${d.pct===null?'0.2':'1'};cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      ${isToday?'border:2px solid var(--text);':''}">
      ${isToday?`<span style="font-size:8px;font-weight:800;color:#000;">${d.pct===null?'':d.pct+'%'}</span>`:''}
    </div>`;
  });
  html += '</div>';
  return html;
}

function showDayDetail(base, type, date){
  const k = clK(base, type, date);
  const cl = S.checklists[k];
  const dt = new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const bn2 = (S.bases||[]).find(b=>b.code===base);
  const baseName = bn2 ? bn2.name : base;

  if(!cl || !cl.items || !cl.items.length){
    toast(`No ${type} checklist data for ${dt}`, 'inf');
    return;
  }

  const applicable = cl.items.filter(i=>!i.na);
  const done = applicable.filter(i=>i.done).length;
  const pct  = applicable.length ? Math.round(done/applicable.length*100) : 100;

  // Build modal overlay
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;display:flex;align-items:flex-end;';
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.remove(); };

  const sheet = document.createElement('div');
  sheet.style.cssText='background:var(--bg2);border-radius:12px 12px 0 0;padding:18px 16px;width:100%;max-height:80vh;overflow-y:auto;';

  let sh = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div>
      <div style="font-size:16px;font-weight:800;">${type.charAt(0).toUpperCase()+type.slice(1)} Checklist</div>
      <div style="font-family:var(--mono);font-size:12px;color:var(--text3);">${baseName} · ${dt}</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-family:var(--mono);font-size:18px;font-weight:800;color:${dayColor(pct)}">${pct}%</span>
      <button onclick="this.closest('div[style*=fixed]').remove()" style="background:none;border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;cursor:pointer;">✕</button>
    </div>
  </div>`;

  let lastSection='';
  cl.items.forEach(item=>{
    if(item.section!==lastSection){
      sh+=`<div style="font-family:var(--mono);font-size:10px;font-weight:800;text-transform:uppercase;color:var(--text3);padding:8px 0 3px;">${item.section}</div>`;
      lastSection=item.section;
    }
    const icon = item.done?'✓':item.na?'N/A':'○';
    const color = item.done?'var(--green)':item.na?'var(--amber)':'var(--text3)';
    sh+=`<div style="display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);">
      <span style="font-family:var(--mono);font-size:13px;font-weight:700;color:${color};min-width:32px;">${icon}</span>
      <div style="flex:1;">
        <div style="font-size:13px;color:var(--text2);${item.done?'text-decoration:line-through;':''}">${item.text}</div>
        ${item.done&&item.doneBy?`<div style="font-family:var(--mono);font-size:10px;color:var(--text3);">✓ ${item.doneBy} · ${new Date(item.doneAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>`:''}
      </div>
    </div>`;
  });

  sheet.innerHTML = sh;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}
